let carrito=
JSON.parse(localStorage.getItem("carrito"))||[];

const productContainer=
document.getElementById("productos");

function renderProducts(lista){

productContainer.innerHTML="";

lista.forEach(producto=>{

productContainer.innerHTML+=`

<div class="col-md-4 mb-4">

<div class="card card-product">

<img src="${producto.imagen}"
class="card-img-top product-img">

<div class="card-body">

<h5>${producto.nombre}</h5>

<p>${producto.categoria}</p>

<p class="text-primary fw-bold">
Stock disponible: ${producto.stock}
</p>

<h4>$${producto.precio}</h4>

<button
class="btn btn-success w-100"
onclick="addToCart(${producto.id})">

Agregar al carrito

</button>

</div>

</div>

</div>

`;

});

}

renderProducts(productos);

function addToCart(id){

const prod=
productos.find(p=>p.id===id);

const existe=
carrito.find(p=>p.id===id);

if(existe){
existe.cantidad++;
}else{
carrito.push({...prod,cantidad:1});
}

saveCart();

}

function saveCart(){

localStorage.setItem(
"carrito",
JSON.stringify(carrito)
);

renderCart();

}

function renderCart(){

const div=
document.getElementById("cartItems");

div.innerHTML="";

let total=0;

carrito.forEach((item,index)=>{

let subtotal=
item.precio*item.cantidad;

total+=subtotal;

div.innerHTML+=`

<div class="card mb-2 p-3">

<b>${item.nombre}</b>

Cantidad:
${item.cantidad}

Subtotal:
$${subtotal.toFixed(2)}

<button
class="btn btn-danger btn-sm mt-2"
onclick="removeItem(${index})">

Eliminar

</button>

</div>

`;

});

document.getElementById("total")
.innerText=total.toFixed(2);

document.getElementById("cartCount")
.innerText=carrito.length;

}

function removeItem(index){

carrito.splice(index,1);

saveCart();

}

renderCart();

document.getElementById("search")
.addEventListener("input",filtrar);

document.getElementById("filter")
.addEventListener("change",filtrar);

function filtrar(){

let texto=
document.getElementById("search")
.value.toLowerCase();

let categoria=
document.getElementById("filter")
.value;

let resultado=
productos.filter(p=>{

let coincideTexto=
p.nombre.toLowerCase().includes(texto);

let coincideCategoria=
categoria==="todos" ||
p.categoria===categoria;

return coincideTexto &&
coincideCategoria;

});

renderProducts(resultado);

}

const nombre=
document.getElementById("nombre");

const cedula=
document.getElementById("cedula");

const boton=
document.getElementById("btnWhatsapp");

function validar(){

boton.disabled=
!(nombre.value.trim() &&
cedula.value.trim());

}

nombre.addEventListener("input",validar);
cedula.addEventListener("input",validar);

boton.addEventListener("click",()=>{

let mensaje=
`Nombre: ${nombre.value}%0A`+
`Cédula: ${cedula.value}%0A%0APedido:%0A`;

let total=0;

carrito.forEach(item=>{

let sub=
item.precio*item.cantidad;

total+=sub;

mensaje+=
`${item.nombre} x${item.cantidad} = $${sub.toFixed(2)}%0A`;

});

mensaje+=
`%0ATOTAL: $${total.toFixed(2)}`;

window.open(
`https://wa.me/593968465397?text=${mensaje}`,
"_blank"
);

});


</script>
